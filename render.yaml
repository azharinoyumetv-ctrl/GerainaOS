services:
  - type: web
    name: geraina-pos-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn server:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: geraina
      - key: JWT_SECRET_KEY
        generateValue: true
